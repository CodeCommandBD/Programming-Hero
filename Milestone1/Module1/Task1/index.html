<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration form</title>
  </head>
  <body>
    <form action="">
      <br />
      &ensp; &ensp;
      <img src="./media/profile.jpg" alt="profile" width="150" height="150" />

      <br />
      &ensp; &ensp;
      <button>
        <label for="profilePic"><strong>Upload Profile Picture:</strong></label>
        <input type="file" id="profilePic" name="userImage" accept="image/*" />
      </button>
      <br />
      <br />
      <br />
      <br />
      <br />
      &ensp; &ensp;
      <label for="stName"><strong>Student Name</strong></label> &ensp;
      <input type="text" name="" id="stName" placeholder="enter your name" />

      <br />
      <br />
      <hr />
      <br />
      &ensp; &ensp;
      <label for="ftName"><strong>Father's Name</strong></label> &ensp;
      <input
        type="text"
        name=""
        id="ftName"
        placeholder="enter your Fathers name"
      />

      &ensp; &ensp; &ensp; &ensp; &ensp; &ensp;
      <label for="mtName"><strong>Mother's Name</strong></label> &ensp;
      <input
        type="text"
        name=""
        id="mtName"
        placeholder="enter your mothers name"
      />
      <br />
      <br />
      <hr />
      <br />
      &ensp; &ensp;
      <label for="email"><strong>Email</strong></label> &ensp;
      <input type="email" name="" id="email" placeholder="enter your email" />

      &ensp; &ensp; &ensp; &ensp; &ensp; &ensp; &ensp; &ensp; &ensp; &ensp;
      &ensp;
      <label for="phNum"><strong>Phone Number</strong></label> &ensp;
      <input
        type="number"
        name=""
        id="phNum"
        placeholder="enter your Phone number"
        max="11"
      />

      <br />
      <br />
      <hr />
      <br />
      &ensp; &ensp;
      <label for=""><strong>Gender:</strong> </label>
      <input type="radio" name="gender" id="male" />
      <label for="male"><em>Male</em></label>
      &ensp;
      <input type="radio" name="gender" id="female" />
      <label for="female"><em>Female</em></label>

      <br />
      <br />
      <br />
      <span>
        &ensp; &ensp;
        <label for=""><strong>Skills:</strong> </label>
        <br />
        <br />
        &ensp; &ensp; &ensp;
        <input type="checkbox" name="" id="html" />
        <label for="html"><em>HTML</em></label>
        <br />
        &ensp; &ensp; &ensp;
        <input type="checkbox" name="" id="css" />
        <label for="css"><em>CSS</em></label>
        <br />
        &ensp; &ensp; &ensp;
        <input type="checkbox" name="" id="js" />
        <label for="js"><em>JS</em></label>
      </span>
      <br />
      <br />
      <br />
      &ensp; &ensp; &ensp;
      <label for="htmlSkill"
        ><strong>HTML Skill Level (1 to 10):</strong></label
      >
      <input
        type="range"
        id="htmlSkill"
        name="htmlSkillLevel"
        min="1"
        max="10"
        value="5"
      />
      &ensp; &ensp; &ensp;
      <label for="htmlSkill"><strong>CSS Skill Level (1 to 10):</strong></label>
      <input
        type="range"
        id="htmlSkill"
        name="htmlSkillLevel"
        min="1"
        max="10"
        value="5"
      />
      &ensp; &ensp; &ensp;
      <label for="htmlSkill"><strong>JS Skill Level (1 to 10):</strong></label>
      <input
        type="range"
        id="htmlSkill"
        name="htmlSkillLevel"
        min="1"
        max="10"
        value="5"
      />
      <br />
      <br />
      <hr />
      <br />
      &ensp; &ensp;
      <select name="India" id="India">
        <option value="BD"><strong>Bangladesh</strong></option>
        <option value="IN"><strong>India</strong></option>
        <option value="JP"><strong>Japan</strong></option>
        <option value="BRA" selected><strong>Brazil</strong></option>
      </select>
      &ensp; &ensp; &ensp; &ensp; &ensp; &ensp; &ensp; &ensp;
      <label for="favColor"><strong>Select Color : </strong></label>
      <input type="color" id="favColor" name="favoriteColor" value="#ff0000" />
      <br />
      <br />
      <hr />
      <br />
      &ensp; &ensp;
      <label for=""><strong>Write your feedback:</strong> </label>
      <br />
      <br />
      &ensp; &ensp;
      <textarea rows="10" cols="80" name="" id=""></textarea>
      <br />
      <br />
      <br />
      &ensp; &ensp;
      <button type="submit"><strong>Submit Button</strong></button>
    </form>
  </body>
</html>
