<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shutter Masonry Gallery</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="page-shell">
      <aside>
        <div class="aside-top">
          <h1>SHUTTER</h1>
        </div>
        <div class="aside-bottom">
          <i
            class="fa-brands fa-facebook fa-flip-360"
            style="color: #ffffff"
          ></i>
          <i class="fa-brands fa-instagram fa-float" style="color: #ffffff"></i>
        </div>
      </aside>
      <div class="page-content">
        <nav class="nav-root">
          <div class="nav-area container">
            <div class="nav-left">
              <ul>
                <li><a class="active" href="">ALL</a></li>
                <li><a href="">LATEST</a></li>
                <li><a href="">POPULAR</a></li>
                <li><a href="">RANDOM</a></li>
              </ul>
            </div>
            <div class="nav-right">
              <button class="common-btn">Upload</button>
            </div>
          </div>
        </nav>
        <header>
          <div class="hero-root">
            <div class="hero-area">
              <div class="hero-content container">
                <h2>
                  Capture the <br />
                  Moment
                </h2>
                <p>Discover curated visuals from around the world.</p>
                <button class="common-btn explore-btn">EXPLORE</button>
              </div>
            </div>
          </div>
        </header>
        <main>
            <section>
                <div class="feed-root">
                    <div class="feed-area container">
                        <div class="feed-content">
                            <h2>Curated Feed</h2>
                            <div class="gallery">
                                <div class="box1">
                                    <img src="https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=600&auto=format&fit=crop" alt="">
                                </div>
                                <div class="box2">
                                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800&auto=format&fit=crop" alt="">
                                </div>
                                <div class="box3">
                                    <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=600&auto=format&fit=crop" alt="">
                                </div>
                                <div class="box4">
                                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=600&auto=format&fit=crop" alt="">
                                </div>
                                <div class="box5">
                                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=600&auto=format&fit=crop" alt="">
                                </div>

                                <div class="box6">
                                    <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=600&auto=format&fit=crop" alt="">
                                </div>
                                <div class="box7">
                                    <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=800&auto=format&fit=crop" alt="">
                                </div>
                                <div class="box8">
                                    <img src="https://images.unsplash.com/photo-1530968464165-7a1861cbaf9f?q=80&w=600&auto=format&fit=crop" alt="">
                                </div>
                                <div class="box9">
                                    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=600&auto=format&fit=crop" alt="">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
      </div>
    </div>
  </body>
</html>
